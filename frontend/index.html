    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts non-blocking laden: preload + onload-swap nimmt den Stylesheet aus
         dem Critical Path (spart laut Lighthouse ~290 ms LCP).
         display=optional: Browser entscheidet je Verbindung, ob Inter geladen
         wird (sonst Fallback). Eliminiert den CLS durch nachtraeglichen
         Font-Swap. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=optional"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=optional" />
    </noscript>
    <title>BeeQu</title>
  </head>
