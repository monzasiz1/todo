<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/icons/icon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="BeeQu ist deine smarte Produktivitaets-App: Aufgaben, Kalender, Notizen, Gruppen und KI-Unterstuetzung in einer App. Offline-faehig, sicher und schnell." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BeeQu" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="BeeQu" />
    <meta name="msapplication-TileColor" content="#007AFF" />
    <!-- Inter self-hosted (Variable Font, latin subset, 47 KB).
         Same-origin -> kein DNS/TLS-Handshake zu fonts.gstatic.com.
         font-display:swap im @font-face sorgt fuer sofortigen Text-Paint
         mit Fallback und nahtlosen Swap, sobald die Variable-WOFF2 da ist.
         Preload mit fetchpriority=high holt die Datei parallel zum CSS. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/inter-latin-variable.woff2"
      crossorigin
      fetchpriority="high"
    />
    <!-- LCP-Bild: Splash-Logo wird per React gerendert. Vorladen sorgt dafuer,
         dass der Browser das Bild bereits parallel zum JS-Bootstrap holt.
         Eigene 144x144-Variante (~47 KB) statt 192x192 icon.png (79 KB). -->
    <link
      rel="preload"
      as="image"
      href="/icons/icon-splash.png"
      fetchpriority="high"
    />
    <title>BeeQu</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
