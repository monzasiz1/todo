<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>BeeQu Icon Generator</h2>
<p>Klicke auf die Buttons um die Icons zu downloaden, dann lege sie in <code>frontend/public/icons/</code></p>
<div id="previews"></div>
<script>
const sizes = [
  { name: 'icon-192.png', size: 192, maskable: false },
  { name: 'icon-512.png', size: 512, maskable: false },
  { name: 'icon-maskable-192.png', size: 192, maskable: true },
  { name: 'icon-maskable-512.png', size: 512, maskable: true },
  { name: 'apple-touch-icon.png', size: 180, maskable: false },
];

const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <path d="M148 268 L218 338 L364 192" fill="none" stroke="white" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="380" cy="148" r="8" fill="rgba(255,255,255,0.9)"/>
  <circle cx="400" cy="128" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="360" cy="122" r="4" fill="rgba(255,255,255,0.5)"/>
</svg>`;

const maskableSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg2)"/>
  <path d="M168 268 L228 328 L344 212" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="360" cy="168" r="7" fill="rgba(255,255,255,0.9)"/>
  <circle cx="378" cy="150" r="4.5" fill="rgba(255,255,255,0.6)"/>
</svg>`;

const container = document.getElementById('previews');

sizes.forEach(({ name, size, maskable }) => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([maskable ? maskableSvg : svgString], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const div = document.createElement('div');
    div.style.cssText = 'display:inline-block;margin:16px;text-align:center';
    div.innerHTML = `<p><strong>${name}</strong> (${size}x${size})</p>`;
    div.appendChild(canvas);
    canvas.style.cssText = `width:${Math.min(size,128)}px;height:${Math.min(size,128)}px;display:block;margin:8px auto;border-radius:20px`;
    const btn = document.createElement('button');
    btn.textContent = 'Download';
    btn.style.cssText = 'padding:8px 20px;border-radius:8px;border:none;background:#007AFF;color:white;cursor:pointer;font-weight:600';
    btn.onclick = () => {
      const a = document.createElement('a');
      a.download = name;
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    div.appendChild(btn);
    container.appendChild(div);
  };
  img.src = url;
});
</script>
</body>
</html>
