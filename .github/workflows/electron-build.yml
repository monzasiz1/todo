name: Build Desktop App (manuell, ohne Auto-Update)

# Hinweis: Releases laufen über release-desktop.yml (electron-builder --publish).
# Dieser Workflow ist nur noch manuell für Test-Builds nutzbar.
on:
  workflow_dispatch:

permissions:
  contents: write   # Für GitHub Releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Windows Build → .exe Installer (NSIS) + Portable
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Dependencies installieren
        working-directory: electron
        run: npm ci

      - name: Windows App bauen
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:win

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            electron/dist/*.exe
            electron/dist/*.msi
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # macOS Build → .dmg (Intel x64 + Apple Silicon arm64)
  # ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS Build (.dmg)
    runs-on: macos-latest
    continue-on-error: true  # Fehler blockieren nicht den Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Dependencies installieren
        working-directory: electron
        run: npm ci

      - name: macOS App bauen
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: macos-builds
          path: electron/dist/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # GitHub Release erstellen und Dateien anhängen (nur bei Tags)
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Windows-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: release-files/

      - name: macOS-Artefakte herunterladen
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: macos-builds
          path: release-files/

      - name: Dateien anzeigen
        run: ls -la release-files/

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: BeeQu ${{ github.ref_name }}
          body: |
            ## BeeQu Desktop App ${{ github.ref_name }}

            ### Download
            | Plattform | Datei | Beschreibung |
            |-----------|-------|--------------|
            | Windows | `BeeQu-Setup-*.exe` | Installer (empfohlen) |
            | Windows | `BeeQu-*.exe` | Portable (kein Install nötig) |
            | macOS | `BeeQu-*.dmg` | Disk Image (Intel + Apple Silicon) |

            ### Installation
            **Windows:** Installer ausführen oder Portable-EXE direkt starten.
            **macOS:** DMG öffnen → BeeQu in Programme ziehen → Rechtsklick → Öffnen (beim ersten Start).
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: true
